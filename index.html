<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d0b14">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Mis Versos">
  <link rel="manifest" id="pwa-manifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <title>Mis Versos</title>

<style>
/* ═══════════════════════════════════════════════════════
   VARIABLES (sobrescritas por el sistema de temas)
═══════════════════════════════════════════════════════ */
:root {
  --bg:          #0d0b14;
  --bg-2:        #13101e;
  --surface:     #1a1628;
  --surface-2:   #221d32;
  --border:      rgba(200,185,230,0.10);
  --accent:      #d4a574;
  --accent-2:    #c4a0c0;
  --accent-glow: rgba(212,165,116,0.18);
  --text:        #ede7dc;
  --text-2:      #a89dba;
  --muted:       #5e5673;
  --danger:      #e07070;
  --success:     #7ec8a0;
  --radius:      14px;
  --radius-lg:   20px;
  --shadow:      0 8px 40px rgba(0,0,0,0.6);
  --trans:       all 0.28s cubic-bezier(0.34,1.2,0.64,1);
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-weight:300; -webkit-font-smoothing:antialiased; overflow:hidden; }

/* ── Pantallas ─────────────────────────────────────── */
.screen { position:fixed; inset:0; display:flex; flex-direction:column; transition:opacity .38s ease,transform .38s ease; will-change:transform,opacity; }
.screen.hidden { opacity:0; pointer-events:none; transform:translateY(14px); display:block !important; }

/* ══════════════════════════════════════════════════════
   LOGIN
══════════════════════════════════════════════════════ */
#screen-login {
  justify-content:center; align-items:center; padding:24px;
  background:radial-gradient(ellipse 70% 55% at 50% 120%,rgba(180,120,200,.14) 0%,transparent 70%),
             radial-gradient(ellipse 50% 40% at 80% -10%,rgba(212,165,116,.10) 0%,transparent 60%),
             var(--bg);
}
#screen-login::before {
  content:''; position:fixed; inset:0; pointer-events:none;
  background-image:
    radial-gradient(1px 1px at 20% 30%,rgba(212,165,116,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 75% 20%,rgba(196,160,192,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 55% 80%,rgba(212,165,116,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 10% 70%,rgba(196,160,192,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 90% 60%,rgba(212,165,116,.4) 0%,transparent 100%);
}
.login-card { width:100%; max-width:360px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:42px 36px 36px; box-shadow:var(--shadow),0 0 60px rgba(180,120,200,.08); animation:cardIn .6s cubic-bezier(.22,1,.36,1) both; }
@keyframes cardIn { from{opacity:0;transform:translateY(28px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }
.login-logo { text-align:center; margin-bottom:32px; }
.login-logo .logo-icon { font-size:2.6rem; margin-bottom:10px; display:block; filter:drop-shadow(0 0 12px rgba(212,165,116,.4)); }
.login-logo h1 { font-family:'Cormorant Garamond',serif; font-size:1.65rem; font-weight:400; letter-spacing:.02em; }
.login-logo p  { font-size:.78rem; color:var(--text-2); margin-top:4px; font-style:italic; font-family:'Cormorant Garamond',serif; letter-spacing:.04em; }
.field { margin-bottom:16px; }
.field label { display:block; font-size:.72rem; color:var(--text-2); letter-spacing:.08em; text-transform:uppercase; margin-bottom:8px; }
.field input { width:100%; background:var(--bg-2); border:1px solid var(--border); border-radius:10px; padding:13px 16px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:.95rem; font-weight:300; outline:none; transition:border-color .2s,box-shadow .2s; }
.field input:focus { border-color:rgba(212,165,116,.5); box-shadow:0 0 0 3px rgba(212,165,116,.1); }
.field input::placeholder { color:var(--muted); }
.btn-primary { width:100%; padding:14px; background:linear-gradient(135deg,#c49255,#d4a574); border:none; border-radius:10px; color:#1a1010; font-family:'DM Sans',sans-serif; font-size:.9rem; font-weight:500; letter-spacing:.05em; cursor:pointer; margin-top:8px; transition:var(--trans); position:relative; overflow:hidden; }
.btn-primary::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,.12),transparent); opacity:0; transition:opacity .2s; }
.btn-primary:hover::after { opacity:1; }
.btn-primary:active { transform:scale(.98); }
.btn-primary:disabled { opacity:.5; cursor:not-allowed; }
.login-error { margin-top:14px; padding:10px 14px; background:rgba(224,112,112,.12); border:1px solid rgba(224,112,112,.3); border-radius:8px; font-size:.82rem; color:var(--danger); display:none; }
.login-error.visible { display:block; }
.login-spinner { display:none; align-items:center; justify-content:center; gap:8px; font-size:.82rem; color:var(--text-2); margin-top:14px; }
.login-spinner.visible { display:flex; }

/* ══════════════════════════════════════════════════════
   GALERÍA — Header compacto (SIN barra extra de usuario)
══════════════════════════════════════════════════════ */
#screen-galeria { background:var(--bg); overflow:hidden; }

.gallery-header {
  flex-shrink:0; display:flex; align-items:center; gap:10px;
  padding:10px 16px; padding-top:calc(10px + env(safe-area-inset-top));
  border-bottom:1px solid var(--border);
  background:var(--bg-2); min-height:52px;
}
.gallery-logo-small { font-size:1.3rem; flex-shrink:0; filter:drop-shadow(0 0 8px rgba(212,165,116,.4)); }
.gallery-header-info { flex:1; min-width:0; }
.gallery-title    { font-family:'Cormorant Garamond',serif; font-size:1rem; font-weight:400; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.gallery-subtitle { font-size:.7rem; color:var(--text-2); font-style:italic; font-family:'Cormorant Garamond',serif; }

.btn-icon { width:36px; height:36px; border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--text-2); font-size:.95rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:var(--trans); flex-shrink:0; position:relative; }
.btn-icon:hover  { background:var(--surface-2); color:var(--text); }
.btn-icon:active { transform:scale(.92); }

.gallery-body { flex:1; overflow-y:auto; overflow-x:hidden; padding:14px 14px calc(28px + env(safe-area-inset-bottom)); -webkit-overflow-scrolling:touch; }
.gallery-body::-webkit-scrollbar { width:4px; }
.gallery-body::-webkit-scrollbar-track { background:transparent; }
.gallery-body::-webkit-scrollbar-thumb { background:var(--muted); border-radius:2px; }
.ptr-hint { text-align:center; font-size:.7rem; color:var(--muted); padding:4px 0 14px; font-style:italic; font-family:'Cormorant Garamond',serif; }
.gallery-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:60px 20px; text-align:center; color:var(--muted); }
.gallery-empty .empty-icon { font-size:3rem; opacity:.5; }
.gallery-empty p { font-family:'Cormorant Garamond',serif; font-size:1.05rem; font-style:italic; }

.poems-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
@media(min-width:500px){ .poems-grid { grid-template-columns:repeat(3,1fr); } }
@media(min-width:700px){ .poems-grid { grid-template-columns:repeat(4,1fr); } }

.poem-card { border-radius:var(--radius); overflow:hidden; background:var(--surface); border:1px solid var(--border); cursor:pointer; transition:var(--trans); animation:cardSlideIn .4s ease both; position:relative; }
.poem-card:active { transform:scale(.96); }
.poem-card:hover  { border-color:rgba(212,165,116,.3); box-shadow:0 4px 24px rgba(0,0,0,.4); }
@keyframes cardSlideIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

.poem-thumb { width:100%; aspect-ratio:3/2; object-fit:contain; display:block; background:#0d0b14; }
.poem-thumb-placeholder { width:100%; aspect-ratio:3/2; display:flex; flex-direction:column; align-items:center; justify-content:center; background:linear-gradient(160deg,var(--surface-2) 0%,var(--bg-2) 100%); position:relative; overflow:hidden; }
.poem-thumb-placeholder::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(-45deg,transparent,transparent 18px,rgba(200,185,230,.03) 18px,rgba(200,185,230,.03) 19px); }
.placeholder-icon { font-size:2.2rem; opacity:.35; z-index:1; }
.poem-info  { padding:8px 10px 10px; }
.poem-title { font-family:'Cormorant Garamond',serif; font-size:.88rem; font-weight:400; color:var(--text); line-height:1.3; margin-bottom:3px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.poem-date  { font-size:.65rem; color:var(--muted); font-style:italic; }
.poem-badge-new { position:absolute; top:8px; right:8px; background:var(--accent); color:#1a1010; font-size:.6rem; font-weight:500; letter-spacing:.06em; padding:2px 7px; border-radius:20px; text-transform:uppercase; }

.spinner { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-overlay { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:60px 20px; color:var(--text-2); font-family:'Cormorant Garamond',serif; font-style:italic; }

/* ══════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════ */
#toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--surface-2); border:1px solid var(--border); border-radius:24px; padding:10px 22px; font-size:.82rem; color:var(--text); box-shadow:var(--shadow); z-index:9999; transition:transform .32s cubic-bezier(.34,1.3,.64,1),opacity .32s; white-space:nowrap; pointer-events:none; opacity:0; }
#toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

/* ══════════════════════════════════════════════════════
   BOTTOM SHEET
══════════════════════════════════════════════════════ */
.bottom-sheet-overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:800; opacity:0; pointer-events:none; transition:opacity .28s; backdrop-filter:blur(3px); }
.bottom-sheet-overlay.open { opacity:1; pointer-events:all; }
.bottom-sheet { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-radius:var(--radius-lg) var(--radius-lg) 0 0; border-top:1px solid var(--border); padding:16px 0 calc(env(safe-area-inset-bottom) + 16px); z-index:801; transform:translateY(100%); transition:transform .32s cubic-bezier(.34,1.1,.64,1); }
.bottom-sheet-overlay.open .bottom-sheet { transform:translateY(0); }
.sheet-handle { width:38px; height:4px; background:var(--muted); border-radius:2px; margin:0 auto 20px; opacity:.4; }
.sheet-user-info { padding:0 24px 16px; border-bottom:1px solid var(--border); margin-bottom:8px; }
.sheet-user-name  { font-family:'Cormorant Garamond',serif; font-size:1.25rem; font-weight:400; color:var(--text); }
.sheet-user-login { font-size:.78rem; color:var(--text-2); }
.sheet-btn { width:100%; padding:14px 24px; background:none; border:none; color:var(--text); font-family:'DM Sans',sans-serif; font-size:.9rem; text-align:left; cursor:pointer; display:flex; align-items:center; gap:12px; transition:background .18s; }
.sheet-btn:hover  { background:rgba(255,255,255,.04); }
.sheet-btn:active { background:rgba(255,255,255,.08); }
.sheet-btn.danger { color:var(--danger); }
.sheet-btn .sheet-btn-icon { font-size:1.1rem; width:24px; text-align:center; }

/* ══════════════════════════════════════════════════════
   VISOR DE POEMA — Rediseñado completamente
══════════════════════════════════════════════════════ */
#visor-overlay {
  position:fixed; inset:0; z-index:500; background:var(--bg);
  display:flex; flex-direction:column;
}
#visor-overlay.hidden { display:none !important; }

/* Header del visor */
#visor-header {
  display:flex; align-items:center; gap:8px;
  padding:8px 12px; background:var(--bg-2);
  border-bottom:1px solid var(--border);
  flex-shrink:0; position:relative; min-height:48px;
}
#visor-titulo {
  font-family:'Cormorant Garamond',serif; font-size:1rem;
  color:var(--text); overflow:hidden; text-overflow:ellipsis;
  white-space:nowrap; flex:1;
}
#visor-close-btn {
  background:var(--surface); border:1px solid var(--border);
  color:var(--text-2); border-radius:50%; width:32px; height:32px;
  font-size:.9rem; cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition:var(--trans);
}
#visor-close-btn:hover { background:var(--surface-2); }

/* Progress bar — línea delgada al fondo del header */
#visor-progress {
  position:absolute; bottom:0; left:0; right:0; height:2px; overflow:hidden;
}
#visor-progress-fill {
  height:100%; width:0%;
  background:linear-gradient(90deg,var(--accent),var(--accent-2));
  transition:width .55s cubic-bezier(.1,.8,.2,1), opacity .4s;
  border-radius:0 1px 1px 0; opacity:0;
}

/* Botón toggle social (solo móvil) */
#btn-toggle-social { flex-shrink:0; }
#social-badge {
  position:absolute; top:3px; right:3px;
  width:7px; height:7px; background:var(--accent);
  border-radius:50%; border:1.5px solid var(--bg-2);
}

/* Cuerpo: iframe + social */
#visor-body { flex:1; display:flex; flex-direction:column; overflow:hidden; }
#visor-frame { flex:1; border:none; width:100%; background:#fff; display:block; min-height:0; }

/* Panel social — MÓVIL: abajo, colapsable */
#panel-social {
  flex-shrink:0; background:var(--bg-2);
  border-top:1px solid var(--border);
  display:flex; flex-direction:column;
  max-height:42vh;
  transition:max-height .35s cubic-bezier(.34,1.1,.64,1);
  overflow:hidden;
}
#panel-social.social-collapsed { max-height:50px; }

#barra-emojis {
  display:flex; align-items:center; gap:4px; flex-wrap:wrap;
  padding:7px 12px; border-bottom:1px solid var(--border);
  flex-shrink:0; min-height:50px; overflow-x:auto;
}
#barra-emojis::-webkit-scrollbar { display:none; }
#lista-comentarios { flex:1; overflow-y:auto; padding:8px 12px; display:flex; flex-direction:column; gap:8px; min-height:0; }
#lista-comentarios::-webkit-scrollbar { width:3px; }
#lista-comentarios::-webkit-scrollbar-thumb { background:var(--muted); border-radius:2px; }
#social-input-area { display:flex; gap:8px; padding:8px 12px; border-top:1px solid var(--border); background:var(--surface); flex-shrink:0; }
#inp-comentario { flex:1; background:var(--bg-2); border:1px solid var(--border); border-radius:20px; padding:8px 14px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:.85rem; outline:none; transition:border-color .2s,box-shadow .2s; }
#inp-comentario:focus { border-color:rgba(212,165,116,.5); box-shadow:0 0 0 3px rgba(212,165,116,.1); }
#btn-send-comentario { background:var(--accent); border:none; border-radius:50%; width:36px; height:36px; font-size:1rem; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:var(--trans); }
#btn-send-comentario:active { transform:scale(.93); }

/* DESKTOP ≥768px: iframe y social lado a lado */
@media(min-width:768px) {
  #visor-body  { flex-direction:row; }
  #visor-frame { flex:1.5; min-width:0; }
  #panel-social {
    width:300px; flex-shrink:0; max-height:none !important;
    border-top:none; border-left:1px solid var(--border);
    height:100%;
  }
  #btn-toggle-social { display:none !important; }
}
@media(min-width:1024px) { #panel-social { width:340px; } }

/* ── Emojis y comentarios ────────────────────────── */
.emoji-btn { background:var(--surface); border:1.5px solid var(--border); border-radius:20px; padding:3px 9px; cursor:pointer; display:flex; align-items:center; gap:4px; color:var(--text-2); font-family:'DM Sans',sans-serif; font-size:.78rem; transition:all .18s; white-space:nowrap; flex-shrink:0; }
.emoji-btn:hover  { border-color:var(--accent); color:var(--text); }
.emoji-btn:active { transform:scale(.93); }
.emoji-btn.activo { background:rgba(212,165,116,.18); border-color:var(--accent); color:var(--accent); font-weight:500; }
.emoji-btn .cnt   { font-size:.72rem; }
.comentario-item     { display:flex; gap:8px; animation:cardSlideIn .3s ease both; }
.comentario-avatar   { width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent-2)); display:flex; align-items:center; justify-content:center; font-size:.72rem; font-weight:600; color:#1a1010; flex-shrink:0; }
.comentario-burbuja  { background:var(--surface); border:1px solid var(--border); border-radius:0 12px 12px 12px; padding:6px 10px; flex:1; }
.comentario-nombre   { font-size:.72rem; font-weight:500; color:var(--accent); margin-bottom:2px; }
.comentario-texto    { font-size:.82rem; color:var(--text); line-height:1.4; word-break:break-word; }
.comentario-fecha    { font-size:.65rem; color:var(--muted); margin-top:2px; font-style:italic; }
.social-loading      { text-align:center; font-size:.78rem; color:var(--muted); font-style:italic; padding:12px; font-family:'Cormorant Garamond',serif; }
.social-spinner-sm   { width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; display:inline-block; vertical-align:middle; margin-right:6px; }

/* ══════════════════════════════════════════════════════
   SELECTOR DE TEMAS (Fase 5)
══════════════════════════════════════════════════════ */
#modal-temas {
  position:fixed; inset:0; z-index:900;
  background:rgba(0,0,0,.6); backdrop-filter:blur(4px);
  display:flex; align-items:flex-end; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .3s;
}
#modal-temas.open { opacity:1; pointer-events:all; }
#modal-temas-inner {
  background:var(--surface); border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  border-top:1px solid var(--border); padding:20px 20px calc(env(safe-area-inset-bottom) + 20px);
  width:100%; max-width:440px;
  transform:translateY(100%); transition:transform .35s cubic-bezier(.34,1.1,.64,1);
}
#modal-temas.open #modal-temas-inner { transform:translateY(0); }
.tema-titulo { font-family:'Cormorant Garamond',serif; font-size:1.1rem; color:var(--text); text-align:center; margin-bottom:16px; }
.tema-grid   { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
.tema-item   { display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer; padding:10px 4px; border-radius:12px; border:1.5px solid transparent; transition:all .22s; }
.tema-item:hover  { background:rgba(255,255,255,.05); }
.tema-item.activo { border-color:var(--accent); background:rgba(212,165,116,.08); }
.tema-swatch { width:38px; height:38px; border-radius:50%; border:2px solid rgba(255,255,255,.1); }
.tema-nombre { font-size:.63rem; color:var(--text-2); text-align:center; font-family:'Cormorant Garamond',serif; }
.btn-sec { padding:10px 16px; border:1px solid var(--border); border-radius:10px; background:transparent; color:var(--text-2); cursor:pointer; font-family:'DM Sans',sans-serif; font-size:.82rem; transition:all .18s; }
.btn-sec:hover { background:rgba(255,255,255,.04); color:var(--text); }

/* ══════════════════════════════════════════════════════
   GESTOR DE POEMAS (Fase 5)
══════════════════════════════════════════════════════ */
#modal-gestor {
  position:fixed; inset:0; z-index:900;
  background:rgba(0,0,0,.65); backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center;
  padding:20px; opacity:0; pointer-events:none; transition:opacity .3s;
}
#modal-gestor.open { opacity:1; pointer-events:all; }
#modal-gestor-inner {
  background:var(--surface); border-radius:var(--radius-lg);
  border:1px solid var(--border); box-shadow:var(--shadow);
  width:100%; max-width:500px;
  height:min(88vh, 640px);
  display:flex; flex-direction:column;
  transform:scale(.96) translateY(10px);
  transition:transform .35s cubic-bezier(.34,1.1,.64,1);
}
#modal-gestor.open #modal-gestor-inner { transform:scale(1) translateY(0); }
.gestor-header   { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-bottom:1px solid var(--border); }
.gestor-titulo   { font-family:'Cormorant Garamond',serif; font-size:1.1rem; color:var(--text); }
.gestor-close    { background:none; border:none; color:var(--text-2); font-size:1.1rem; cursor:pointer; padding:4px; }
.gestor-lista    { flex:1; overflow-y:auto; padding:4px 0; min-height:0; }
.gestor-lista::-webkit-scrollbar { width:3px; }
.gestor-lista::-webkit-scrollbar-thumb { background:var(--muted); border-radius:2px; }
.gestor-fila     { display:flex; align-items:center; gap:6px; padding:9px 14px; border-bottom:1px solid rgba(200,185,230,.05); transition:background .15s; }
.gestor-fila:hover { background:rgba(255,255,255,.03); }

<script>
"use strict";

// ── CONFIGURACIÓN — cambia esta URL por la de tu GAS ──────────────
const GAS_URL = "https://script.google.com/macros/s/AKfycbwUlR--ITGCEsbS2DfWUGC5u1xOKtWE6T02i3s2nXFK4XwnFxXsOBrtvP67SDFRfrkO/exec";

// ══════════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════════
const TEMAS = {

    vars:{"--bg":"#0a0a0c","--bg-2":"#111116","--surface":"#18181e","--surface-2":"#222228",

// ══════════════════════════════════════════════════════════════════
//  CACHÉ LOCAL DE POEMAS — IndexedDB (24h TTL)
//  Permite abrir el poema al instante en la segunda visita
// ══════════════════════════════════════════════════════════════════
const PoemCache = {
  _db  : null,
  _TTL : 24 * 60 * 60 * 1000,  // 24 horas en milisegundos

  // Abre (o crea) la base de datos IndexedDB
  async _abrir() {
    if (this._db) return this._db;
    return new Promise((ok, err) => {
      const req = indexedDB.open("poemenizador_cache_v1", 1);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains("poems"))
          db.createObjectStore("poems", { keyPath: "id" });
      };
      req.onsuccess = e => { this._db = e.target.result; ok(this._db); };
      req.onerror   = () => err(req.error);
    });
  },

  // Devuelve el HTML en caché si existe y no está expirado; null si no
  async get(poemId) {
    try {
      const db   = await this._abrir();
      const data = await new Promise(res => {
        const req = db.transaction("poems","readonly").objectStore("poems").get(poemId);
        req.onsuccess = () => res(req.result);
        req.onerror   = () => res(null);
      });
      if (!data) return null;
      if (Date.now() - data.ts > this._TTL) return null;  // expirado
      return data.html;
    } catch { return null; }
  },

  // Guarda / actualiza el HTML en caché
  async set(poemId, html) {
    try {
      const db = await this._abrir();
      await new Promise(res => {
        const tx = db.transaction("poems","readwrite");
        tx.objectStore("poems").put({ id:poemId, html, ts:Date.now() });
        tx.oncomplete = res; tx.onerror = res;
      });
    } catch { /* falla silenciosa — la caché es opcional */ }
  },

  // Borra toda la caché (al cerrar sesión)
  async limpiar() {
    try {
      const db = await this._abrir();
      const tx = db.transaction("poems","readwrite");
      tx.objectStore("poems").clear();
    } catch { }
  }
};

// ══════════════════════════════════════════════════════════════════
//  CACHÉ SOCIAL — en memoria, dura la sesión (5 min TTL)
//  Al re-abrir el mismo poema, reacciones y comentarios aparecen YA
// ══════════════════════════════════════════════════════════════════
const SocialCache = {
  _map: new Map(),    // poemId → { conteos, miEmoji, comentarios, ts }
  _TTL: 5 * 60 * 1000,

  get(poemId) {
    const d = this._map.get(poemId);
    if (!d || Date.now() - d.ts > this._TTL) return null;
    return d;
  },
  set(poemId, conteos, miEmoji, comentarios) {
    this._map.set(poemId, { conteos:{...conteos}, miEmoji, comentarios:[...comentarios], ts:Date.now() });
  },
  actualizarReacciones(poemId, conteos, miEmoji) {
    const d = this._map.get(poemId);
    if (d) { d.conteos = {...conteos}; d.miEmoji = miEmoji; d.ts = Date.now(); }
  },
  agregarComentario(poemId, c) {
    const d = this._map.get(poemId);
    if (d) d.comentarios.push(c);
  },
  limpiar() { this._map.clear(); }
};

// ══════════════════════════════════════════════════════════════════
//  BARRA DE PROGRESO — línea animada en el header del visor
// ══════════════════════════════════════════════════════════════════
const Progress = {
  _fill : null,
  _timer: null,
  _pct  : 0,

  init() { this._fill = document.getElementById("visor-progress-fill"); },

  start() {
    if (!this._fill) return;
    clearTimeout(this._timer);
    this._pct = 0;
    this._fill.style.transition = "none";
    this._fill.style.width   = "0%";
    this._fill.style.opacity = "1";
    // Esperar un frame para que el reset sea visible antes de animar
    requestAnimationFrame(() => {
      this._fill.style.transition = "width .55s cubic-bezier(.1,.8,.2,1), opacity .4s";
      this._avanzar();
    });
  },

  _avanzar() {
    if (this._pct >= 85) return;
    const salto = Math.random() * 18 + 6;      // saltos aleatorios de 6–24%
    this._pct   = Math.min(85, this._pct + salto);
    this._fill.style.width = this._pct + "%";
    const delay = 280 + Math.random() * 380;   // cada 280–660 ms
    this._timer = setTimeout(() => this._avanzar(), delay);
  },

  complete() {
    clearTimeout(this._timer);
    this._fill.style.background = "";  // restaurar color original
    this._fill.style.width = "100%";
    setTimeout(() => {
      this._fill.style.opacity = "0";
      setTimeout(() => { this._fill.style.width = "0%"; }, 420);
    }, 300);
  },

  error() {
    clearTimeout(this._timer);
    this._fill.style.background = "var(--danger)";
    this._fill.style.width = "100%";
    setTimeout(() => {
      this._fill.style.opacity = "0";
      setTimeout(() => {
        this._fill.style.width   = "0%";
        this._fill.style.background = "";
      }, 420);
    }, 700);
  }
};

// ══════════════════════════════════════════════════════════════════
//  UTILIDADES BASE
// ══════════════════════════════════════════════════════════════════
async function hashPwd(pwd) {
  const enc = new TextEncoder().encode(pwd);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

async function gasPost(payload, timeoutMs = 30000) {
  const ctrl = new AbortController();
  const tid  = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    const resp = await fetch(GAS_URL, {
      method:"POST", headers:{"Content-Type":"text/plain"},
      body:JSON.stringify(payload), signal:ctrl.signal
    });
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    return resp.json();
  } finally { clearTimeout(tid); }
}


// ── Mostrar / ocultar contraseña ─────────────────────────────────────
function togglePwd(inputId, iconId) {
  const inp  = el(inputId);
  const icon = el(iconId);
  if (!inp || !icon) return;
  if (inp.type === "password") {
    inp.type = "text";
    icon.textContent = "🙈";
  } else {
    inp.type = "password";
    icon.textContent = "👁️";
  }
}

function el(id) { return document.getElementById(id); }
function show(id) { el(id).classList.remove("hidden"); }
function hide(id) { el(id).classList.add("hidden"); }
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.add("hidden"));
  el(id).classList.remove("hidden");
}

let _toastTimer;
function toast(msg, dur = 2800) {
  const t = el("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove("show"), dur);
}

function formatearFecha(str) {
  if (!str) return "";
  const m = str.match(/(\d{2})\/(\d{2})\/(\d{4})/);
  if (!m) return str;
  const mes = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  return `${parseInt(m[1])} ${mes[parseInt(m[2])-1]} ${m[3]}`;
}
function esReciente(fechaStr, diasMax = 7) {
  if (!fechaStr) return false;
  const m = fechaStr.match(/(\d{2})\/(\d{2})\/(\d{4})/);
  if (!m) return false;
  return (Date.now() - new Date(+m[3], +m[2]-1, +m[1]).getTime()) < diasMax * 86_400_000;
}
function _esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ══════════════════════════════════════════════════════════════════
//  ESTADO
// ══════════════════════════════════════════════════════════════════
const State = {
  token    : localStorage.getItem("pwa_token")    || "",
  sesionId : localStorage.getItem("pwa_sesion_id")|| "",
  nombre   : localStorage.getItem("pwa_nombre")   || "",
  usuario  : localStorage.getItem("pwa_usuario")  || "",
  pwdHash  : localStorage.getItem("pwa_pwd_hash") || "",
  tema     : localStorage.getItem("pwa_tema")     || "nocturno",

  guardar(recordar = false) {
    localStorage.setItem("pwa_token",     this.token);
    localStorage.setItem("pwa_sesion_id", this.sesionId);
    localStorage.setItem("pwa_nombre",    this.nombre);
    localStorage.setItem("pwa_usuario",   this.usuario);
    localStorage.setItem("pwa_tema",      this.tema);
    if (recordar) {
      localStorage.setItem("pwa_pwd_hash", this.pwdHash);
      localStorage.setItem("pwa_recordar", "1");
    }
  },
  limpiar() {
    const recordar = localStorage.getItem("pwa_recordar") === "1";
    ["pwa_token","pwa_sesion_id","pwa_nombre"].forEach(k => localStorage.removeItem(k));
    if (!recordar) ["pwa_usuario","pwa_pwd_hash","pwa_recordar"].forEach(k => localStorage.removeItem(k));
    this.token = this.sesionId = this.nombre = "";
    if (!recordar) { this.usuario = ""; this.pwdHash = ""; }
  },
  tieneCredenciales() {
    return localStorage.getItem("pwa_recordar")==="1"
        && !!localStorage.getItem("pwa_usuario")
        && !!localStorage.getItem("pwa_pwd_hash");
  }
};

// ══════════════════════════════════════════════════════════════════
//  APP
// ══════════════════════════════════════════════════════════════════
const App = {
  _socialVisible : true,   // estado del panel social en móvil
  _poemas        : [],     // lista en memoria (para el gestor)

  async init() {
    Progress.init();

    // Service Worker
    if ("serviceWorker" in navigator) {
      try { await navigator.serviceWorker.register("sw.js"); } catch(_) {}
    }
    _inyectarManifest();

    // Aplicar tema guardado (sin guardar de nuevo)
    this.aplicarTema(State.tema, false);

    // Listeners de teclado
    el("inp-pwd").addEventListener("keydown", e => { if(e.key==="Enter") this.login(); });
    el("inp-comentario").addEventListener("keydown", e => { if(e.key==="Enter") Social.enviarComentario(); });
    el("inp-pwd-confirmar").addEventListener("keydown", e => { if(e.key==="Enter") this.guardarNuevaPwd(); });
    el("inp-usuario").addEventListener("keydown", e => { if(e.key==="Enter") el("inp-pwd").focus(); });

    // Pre-rellenar si hay credenciales guardadas
    if (State.tieneCredenciales()) {
      el("chk-recordar").checked = true;
      if (!el("inp-usuario").value) el("inp-usuario").value = State.usuario;
    }

    // Auto-login
    if (State.token && State.sesionId) await this.validarSesion();
    else showScreen("screen-login");
  },

  async validarSesion() {
    try {
      const res = await gasPost({ action:"pwa_validar_token", token:State.token });
      if (res.valido) {
        if (res.sesion_id) { State.sesionId = res.sesion_id; State.guardar(); }
        this.mostrarGaleria();
      } else { State.limpiar(); showScreen("screen-login"); }
    } catch(_) {
      // Sin red → entrar en modo offline si hay token
      State.token ? this.mostrarGaleria() : showScreen("screen-login");
    }
  },

  async login() {
    const usuario = el("inp-usuario").value.trim();
    const pwd     = el("inp-pwd").value;
    if (!usuario || !pwd) { this._mostrarError("Introduce tu usuario y contraseña."); return; }

    el("btn-login").disabled = true;
    el("login-error").classList.remove("visible");
    el("login-spinner").classList.add("visible");

    try {
      const pwdHash = await hashPwd(pwd);
      const res = await gasPost({ action:"pwa_login", usuario, pwd_hash:pwdHash });
      if (res.ok) {
        const recordar = el("chk-recordar").checked;
        Object.assign(State, { token:res.token, sesionId:res.sesion_id, nombre:res.nombre, usuario, pwdHash });
        State.guardar(recordar);
        this.mostrarGaleria();
      } else {
        this._mostrarError(_mensajeError(res.error));
      }
    } catch { this._mostrarError("No se pudo conectar. Comprueba tu conexión."); }
    finally  { el("btn-login").disabled = false; el("login-spinner").classList.remove("visible"); }
  },

  _mostrarError(msg) {
    const e = el("login-error"); e.textContent = msg; e.classList.add("visible");
  },

  mostrarGaleria() {
    const nombre = State.nombre || State.usuario;
    el("gallery-title-text").textContent = "Hola, " + nombre + " 💛";
    el("gallery-subtitle").textContent   = "tu galería privada";
    el("gallery-user-initial").textContent = nombre.charAt(0).toUpperCase();
    el("sheet-nombre").textContent  = State.nombre || State.usuario;
    el("sheet-usuario").textContent = "@" + State.usuario;
    showScreen("screen-galeria");
    this.cargarPoemas();
  },

  async cargarPoemas() {
    show("gallery-loading"); hide("gallery-content"); hide("gallery-empty");
    try {
      const res = await gasPost({ action:"pwa_listar_poemas", sesion_id:State.sesionId, pwa_token:State.token });
      hide("gallery-loading");
      if (!res.ok || !res.poemas) {
        const msg = res.error==="acceso_denegado" ? "Sesión no verificada." : (res.error||"Error al cargar poemas.");
        el("gallery-empty").querySelector("p").textContent = "⚠️ " + msg;
        show("gallery-empty"); return;
      }
      this._poemas = res.poemas;
      // La galería solo muestra poemas visibles; el gestor los ve todos
      const visibles = res.poemas.filter(p => p.visible !== false && p.visible !== "false" && p.visible !== "0" && p.visible !== 0);
      if (!visibles.length) { show("gallery-empty"); }
      else { this.renderPoemas(visibles); show("gallery-content"); }
      const total = res.poemas.length;
      const ocultos = total - visibles.length;
      el("gallery-subtitle").textContent = visibles.length + (visibles.length===1?" poema":" poemas")
        + (ocultos > 0 ? " · " + ocultos + " oculto(s)" : "");
    } catch(e) {
      hide("gallery-loading");
      const msg = e.name==="AbortError" ? "La petición tardó demasiado." : "Sin conexión.";
      toast(msg);
      el("gallery-empty").querySelector("p").textContent = "⚠️ " + msg;
      show("gallery-empty");
    }
  },

  renderPoemas(poemas) {
    const grid = el("poems-grid");
    grid.innerHTML = "";
    poemas.forEach((p, i) => {
      const card = document.createElement("div");
      card.className = "poem-card";
      card.style.animationDelay = (i * 55) + "ms";
      card.onclick = () => this.abrirPoema(p);
      card.innerHTML = `
        ${esReciente(p.creado_en) ? '<span class="poem-badge-new">nuevo</span>' : ""}
        ${this.renderThumb(p)}
        <div class="poem-info">
          <div class="poem-title">${_esc(p.titulo)}</div>
          <div class="poem-date">${formatearFecha(p.creado_en)}</div>
        </div>`;
      grid.appendChild(card);
    });
  },

  renderThumb(p) {
    if (p.miniatura) {
      let src;
      if (p.miniatura.startsWith("data:")) {
        // Ya lleva el prefijo completo
        src = p.miniatura;
      } else {
        // Detectar tipo por los primeros bytes del base64:
        // PNG  → base64 empieza con "iVBOR"
        // JPEG → "/9j/" o "base64,/9j"
        // SVG  → "PHN2" (="<sv") o "Cjxz" (newline+"<s")
        // WebP → "UklGR"
        const h = p.miniatura.substring(0, 8);
        let mime;
        if      (h.startsWith("PHN2") || h.startsWith("Cjxz")) mime = "image/svg+xml";
        else if (h.startsWith("iVBOR"))                          mime = "image/png";
        else if (h.startsWith("UklGR"))                          mime = "image/webp";
        else                                                     mime = "image/jpeg";
        src = `data:${mime};base64,` + p.miniatura;
      }
      return `<img class="poem-thumb" src="${src}" alt="${_esc(p.titulo)}" loading="lazy" onerror="this.parentElement.replaceChild(_placeholderThumb(),this)">`;
    }
    return _placeholderThumbHTML();
  },

  abrirPoema(p) {
    if (!p.id) { toast("Poema sin datos disponibles."); return; }
    this.abrirVisor(p);
  },

  // ── Abrir visor con caché local + progress bar ─────────────────
  async abrirVisor(p) {
    // Preparar la pantalla del visor
    el("visor-titulo").textContent = p.titulo || "Poema";
    el("visor-overlay").classList.remove("hidden");
    document.body.style.overflow = "hidden";

    // Restaurar panel social a modo visible en móvil
    this._socialVisible = true;
    el("panel-social").classList.remove("social-collapsed");
    hide("social-badge");

    Progress.start();

    // ── 1. Intentar abrir desde caché IndexedDB (instantáneo) ────
    const htmlCached = await PoemCache.get(p.id);
    if (htmlCached) {
      el("visor-frame").srcdoc = htmlCached;
      Progress.complete();
      // Cargar social (desde caché de memoria o red)
      Social.cargar(p.id, p.sesion_id || State.sesionId);
      // Actualizar la caché silenciosamente en segundo plano
      this._refrescarCachePoema(p);
      return;
    }

    // ── 2. Sin caché → llamar al GAS con progress bar ────────────
    try {
      const res = await gasPost(
        { action:"pwa_get_html", poem_id:p.id, pwa_token:State.token },
        30000
      );
      if (!res.ok || !res.html) throw new Error(res.error || "Sin contenido");

      el("visor-frame").srcdoc = res.html;
      Progress.complete();
      PoemCache.set(p.id, res.html);          // guardar para próxima vez
      Social.cargar(p.id, p.sesion_id || State.sesionId);

    } catch(e) {
      Progress.error();
      el("visor-overlay").classList.add("hidden");
      document.body.style.overflow = "";
      if (e.name === "AbortError") toast("⏱ Tiempo agotado. Comprueba tu conexión.");
      else {
        toast("⚠️ Error al abrir el poema.");
        if (p.url_html) window.open(p.url_html, "_blank", "noopener");
      }
    }
  },

  // Actualiza la caché en segundo plano sin bloquear la UI
  async _refrescarCachePoema(p) {
    try {
      const res = await gasPost({ action:"pwa_get_html", poem_id:p.id, pwa_token:State.token }, 20000);
      if (res.ok && res.html) PoemCache.set(p.id, res.html);
    } catch { /* silencioso */ }
  },

  cerrarVisor() {
    el("visor-overlay").classList.add("hidden");
    el("visor-frame").srcdoc = "";
    el("lista-comentarios").innerHTML = "";
    el("barra-emojis").innerHTML      = "";
    el("inp-comentario").value        = "";
    hide("social-badge");
    Social._poemId = "";
    document.body.style.overflow = "";
  },

  // Toggle del panel social (solo en móvil)
  toggleSocial() {
    this._socialVisible = !this._socialVisible;
    el("panel-social").classList.toggle("social-collapsed", !this._socialVisible);
  },

  // ══════════════════════════════════════════════════════════════
  //  TEMAS (Fase 5)
  // ══════════════════════════════════════════════════════════════
  aplicarTema(temaNombre, guardar = true) {
    const tema = TEMAS[temaNombre] || TEMAS.nocturno;
    const root = document.documentElement;
    Object.entries(tema.vars).forEach(([k, v]) => root.style.setProperty(k, v));
    State.tema = temaNombre;
    if (guardar) localStorage.setItem("pwa_tema", temaNombre);
    // Actualizar meta theme-color
    const metaColor = document.querySelector('meta[name="theme-color"]');
    if (metaColor) metaColor.content = tema.vars["--bg"];
  },

  abrirTemas() {
    this.cerrarMenu();
    const grid = el("tema-grid");
    grid.innerHTML = "";
    Object.entries(TEMAS).forEach(([key, tema]) => {
      const item = document.createElement("div");
      item.className = "tema-item" + (State.tema === key ? " activo" : "");
      // Swatch bicolor: mitad fondo, mitad acento
      item.innerHTML = `
        <div class="tema-swatch" style="background:linear-gradient(135deg,${tema.vars["--bg"]} 50%,${tema.vars["--accent"]} 50%)"></div>
        <span class="tema-nombre">${tema.emoji}<br>${tema.nombre}</span>`;
      item.onclick = () => {
        this.aplicarTema(key);
        grid.querySelectorAll(".tema-item").forEach(i => i.classList.remove("activo"));
        item.classList.add("activo");
        toast("Tema " + tema.nombre + " aplicado ✨");
      };
      grid.appendChild(item);
    });
    el("modal-temas").classList.add("open");
  },

  cerrarTemas() { el("modal-temas").classList.remove("open"); },

  // ══════════════════════════════════════════════════════════════
  //  GESTOR DE POEMAS (Fase 5)
  // ══════════════════════════════════════════════════════════════
  abrirGestor() {
    this.cerrarMenu();
    if (!this._poemas.length) { toast("Carga la galería primero."); return; }
    Gestor.cargar(this._poemas);
    el("modal-gestor").classList.add("open");
  },

  cerrarGestor() { el("modal-gestor").classList.remove("open"); },

  // ── Cambiar contraseña ─────────────────────────────────────────
  abrirCambiarPwd() {
    this.cerrarMenu();
    el("pwd-usuario-label").textContent = "@" + State.usuario;
    ["inp-pwd-actual","inp-pwd-nueva","inp-pwd-confirmar"].forEach(id => el(id).value = "");
    el("pwd-error").classList.remove("visible");
    el("pwd-ok").style.display = "none";
    showScreen("screen-cambiar-pwd");
  },

  volverDesdeCambiarPwd() { showScreen("screen-galeria"); },

  async guardarNuevaPwd() {
    const actual    = el("inp-pwd-actual").value;
    const nueva     = el("inp-pwd-nueva").value;
    const confirmar = el("inp-pwd-confirmar").value;
    const err = el("pwd-error"); const ok = el("pwd-ok");
    err.classList.remove("visible"); ok.style.display = "none";

    if (!actual)           { err.textContent="Escribe tu contraseña actual.";            err.classList.add("visible"); return; }
    if (!nueva)            { err.textContent="Escribe la nueva contraseña.";             err.classList.add("visible"); return; }
    if (nueva.length < 6)  { err.textContent="La contraseña debe tener al menos 6 caracteres."; err.classList.add("visible"); return; }
    if (nueva !== confirmar){ err.textContent="Las contraseñas no coinciden.";           err.classList.add("visible"); return; }
    if (nueva === actual)   { err.textContent="La nueva debe ser diferente a la actual.";err.classList.add("visible"); return; }

    const btn = document.querySelector("#screen-cambiar-pwd .btn-primary");
    btn.disabled = true; btn.textContent = "Guardando…";
    try {
      const [hashActual, hashNueva] = await Promise.all([hashPwd(actual), hashPwd(nueva)]);
      const res = await gasPost({ action:"pwa_cambiar_pwd", pwd_actual_hash:hashActual, pwd_nueva_hash:hashNueva, pwa_token:State.token });
      if (res.ok) {
        ok.style.display = "block";
        if (localStorage.getItem("pwa_recordar")==="1") { State.pwdHash = hashNueva; State.guardar(true); }
        setTimeout(() => this.volverDesdeCambiarPwd(), 2000);
      } else {
        const msgs = { pwd_actual_incorrecta:"La contraseña actual es incorrecta.", la_nueva_debe_ser_diferente:"La nueva debe ser diferente.", token_invalido:"Tu sesión expiró." };
        err.textContent = msgs[res.error] || ("Error: " + res.error);
        err.classList.add("visible");
      }
    } catch { err.textContent = "Error de conexión."; err.classList.add("visible"); }
    finally  { btn.disabled = false; btn.textContent = "Guardar nueva contraseña"; }
  },

  refrescar() { toast("Actualizando…"); this.cargarPoemas(); },
  abrirMenu()  { el("sheet-overlay").classList.add("open"); },
  cerrarMenu() { el("sheet-overlay").classList.remove("open"); },
  logout() {
    this.cerrarMenu(); State.limpiar(); SocialCache.limpiar();
    PoemCache.limpiar();  // borra caché local al salir
    showScreen("screen-login");
    el("inp-usuario").value = ""; el("inp-pwd").value = "";
    el("login-error").classList.remove("visible");
    toast("Sesión cerrada.");
  }
};

// ══════════════════════════════════════════════════════════════════
//  SOCIAL — reacciones y comentarios
// ══════════════════════════════════════════════════════════════════
const EMOJIS = ["❤️","😂","😮","😢","🔥","👏","🥹","💌"];

const Social = {
  _poemId : "",
  _sesionActual : "",
  _puedeComentar: false,
  _conteos: {},
  _miEmoji: "",

  async cargar(poemId, poemSesionId) {
    this._poemId       = poemId;
    this._sesionActual = poemSesionId || "";
    this._puedeComentar = !!(State.token && State.sesionId
                           && this._sesionActual && State.sesionId === this._sesionActual);

    // ── 1. Mostrar desde caché de memoria instantáneamente ───────
    const cached = SocialCache.get(poemId);
    if (cached) {
      this._conteos = cached.conteos;
      this._miEmoji = cached.miEmoji;
      this._renderEmojis();
      this._renderComentarios(cached.comentarios);
      this._actualizarPermisoComentario();
      // Actualizar en background (silencioso)
      this._fetchSocial(poemId, false);
      return;
    }

    // ── 2. Sin caché → skeleton de carga + fetch ─────────────────
    this._renderEmojis();   // barra de emojis vacía de inmediato
    el("lista-comentarios").innerHTML = '<div class="social-loading"><span class="social-spinner-sm"></span>Cargando…</div>';
    this._actualizarPermisoComentario();
    await this._fetchSocial(poemId, true);
  },

  // Trae reacciones + comentarios del GAS y actualiza la UI
  async _fetchSocial(poemId, mostrarEnUI) {
    try {
      const [rRes, cRes] = await Promise.all([
        gasPost({ action:"pwa_listar_reacciones",  poem_id:poemId, pwa_token:State.token }),
        gasPost({ action:"pwa_listar_comentarios", poem_id:poemId })
      ]);

      // Ignorar si mientras tanto el usuario abrió otro poema
      if (this._poemId !== poemId) return;

      const conteos     = rRes.ok ? (rRes.conteos     || {}) : this._conteos;
      const miEmoji     = rRes.ok ? (rRes.mi_reaccion || "") : this._miEmoji;
      const comentarios = cRes.ok ? (cRes.comentarios || []) : null;

      this._conteos = conteos;
      this._miEmoji = miEmoji;
      if (mostrarEnUI || rRes.ok)    this._renderEmojis();
      if (comentarios !== null)      this._renderComentarios(comentarios);
      else if (mostrarEnUI)          el("lista-comentarios").innerHTML = '<div class="social-loading">Sin comentarios aún.</div>';

      // Badge de comentarios
      if (comentarios && comentarios.length) show("social-badge"); else hide("social-badge");

      // Guardar en caché
      SocialCache.set(poemId, conteos, miEmoji, comentarios || []);

    } catch {
      if (this._poemId !== poemId) return;
      if (mostrarEnUI) el("lista-comentarios").innerHTML = '<div class="social-loading">⚠️ Sin conexión.</div>';
    }
  },

  _actualizarPermisoComentario() {
    const inp = el("inp-comentario");
    const btn = el("btn-send-comentario");
    inp.disabled    = !this._puedeComentar;
    btn.disabled    = !this._puedeComentar;
    inp.placeholder = this._puedeComentar ? "Escribe un comentario…" : "Solo el destinatario puede comentar aquí 🔒";
    inp.style.opacity = btn.style.opacity = this._puedeComentar ? "1" : "0.5";
  },

  _renderEmojis() {
    const bar = el("barra-emojis");
    bar.innerHTML = "";
    const lbl = document.createElement("span");
    lbl.style.cssText = "font-size:.68rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-right:2px;flex-shrink:0;align-self:center;";
    lbl.textContent = "Reaccionar:";
    bar.appendChild(lbl);
    EMOJIS.forEach(emoji => {
      const cnt    = this._conteos[emoji] || 0;
      const activo = this._miEmoji === emoji;
      const btn    = document.createElement("button");
      btn.className = "emoji-btn" + (activo ? " activo" : "");
      btn.innerHTML = emoji + (cnt > 0 ? ` <span class="cnt">${cnt}</span>` : "");
      btn.title     = activo ? "Quitar reacción" : "Reaccionar con " + emoji;
      btn.onclick   = () => this.reaccionar(emoji);
      bar.appendChild(btn);
    });
  },

  _renderComentarios(comentarios) {
    const lista = el("lista-comentarios");
    if (!comentarios.length) {
      lista.innerHTML = '<div class="social-loading">Sé el primero en comentar ✨</div>';
      return;
    }
    lista.innerHTML = "";
    comentarios.forEach(c => {
      const item = document.createElement("div");
      item.className = "comentario-item";
      const inicial = (c.nombre||"?").charAt(0).toUpperCase();
      item.innerHTML = `
        <div class="comentario-avatar">${inicial}</div>
        <div class="comentario-burbuja">
          <div class="comentario-nombre">${_esc(c.nombre)}</div>
          <div class="comentario-texto">${_esc(c.texto)}</div>
          <div class="comentario-fecha">${_formatFechaSocial(c.creado_en)}</div>
        </div>`;
      lista.appendChild(item);
    });
    lista.scrollTop = lista.scrollHeight;
  },

  async reaccionar(emoji) {
    if (!State.token)  { toast("Inicia sesión para reaccionar."); return; }
    if (!this._poemId) return;
    const conteosAntes = JSON.parse(JSON.stringify(this._conteos));
    const miEmojiAntes = this._miEmoji;
    const esToggleOff  = (this._miEmoji === emoji);
    if (esToggleOff) {
      this._miEmoji = "";
      if (this._conteos[emoji] > 1) this._conteos[emoji]--; else delete this._conteos[emoji];
    } else {
      if (this._miEmoji && this._conteos[this._miEmoji]) {
        if (this._conteos[this._miEmoji] > 1) this._conteos[this._miEmoji]--; else delete this._conteos[this._miEmoji];
      }
      this._miEmoji = emoji; this._conteos[emoji] = (this._conteos[emoji] || 0) + 1;
    }
    this._renderEmojis();
    try {
      const res = await gasPost({ action:"pwa_reaccionar", poem_id:this._poemId, emoji, pwa_token:State.token });
      if (res.ok) {
        this._conteos = res.conteos || {}; this._miEmoji = res.mi_reaccion || "";
        this._renderEmojis(); SocialCache.actualizarReacciones(this._poemId, this._conteos, this._miEmoji);
      } else {
        this._conteos = conteosAntes; this._miEmoji = miEmojiAntes; this._renderEmojis();
        toast("No se pudo guardar la reacción.");
      }
    } catch { this._conteos = conteosAntes; this._miEmoji = miEmojiAntes; this._renderEmojis(); toast("Error al reaccionar."); }
  },

  async enviarComentario() {
    if (!State.token)  { toast("Inicia sesión para comentar."); return; }
    const inp   = el("inp-comentario");
    const texto = inp.value.trim();
    if (!texto) return;
    inp.value = ""; inp.disabled = true;
    const lista = el("lista-comentarios");
    const placeholder = lista.querySelector(".social-loading");
    if (placeholder) placeholder.remove();
    const item = document.createElement("div");
    item.className = "comentario-item";
    item.style.animation = "cardSlideIn .3s ease both";
    item.style.opacity = "0.55";
    const inicial = (State.nombre||"?").charAt(0).toUpperCase();
    item.innerHTML = `<div class="comentario-avatar">${inicial}</div><div class="comentario-burbuja"><div class="comentario-nombre">${_esc(State.nombre||"Tú")}</div><div class="comentario-texto">${_esc(texto)}</div><div class="comentario-fecha">enviando…</div></div>`;
    lista.appendChild(item); lista.scrollTop = lista.scrollHeight; show("social-badge");
    try {
      const res = await gasPost({ action:"pwa_comentar", poem_id:this._poemId, texto, pwa_token:State.token });
      if (res.ok) {
        item.style.opacity = "1";
        item.querySelector(".comentario-fecha").textContent = "ahora mismo";
        SocialCache.agregarComentario(this._poemId, res.comentario);
      } else {
        item.remove(); inp.value = texto;
        const msg = res.error==="solo_el_destinatario_puede_comentar" ? "Solo el destinatario puede comentar." : (res.error||"Error al comentar.");
        toast(msg);
      }
    } catch { item.remove(); inp.value = texto; toast("Error de conexión."); }
    finally  { inp.disabled = false; inp.focus(); }
  }
};

// ══════════════════════════════════════════════════════════════════
//  GESTOR DE POEMAS (Fase 5) — reordenar y toggle de visibilidad
// ══════════════════════════════════════════════════════════════════
const Gestor = {
  _poemas  : [],    // copia de trabajo
  _original: [],    // copia original para detectar cambios

  cargar(poemas) {
    this._original = poemas.map(p => ({...p}));
    this._poemas   = poemas.map(p => ({...p}));
    this._confirmando = -1;
    const cnt = el("gestor-contador");
    if (cnt) cnt.textContent = `${poemas.length} poema${poemas.length!==1?"s":""}`;
    this._render();
  },

  _esVisible(p) {
    return p.visible !== false && p.visible !== "false" && p.visible !== "0" && p.visible !== 0;
  },

  _socialStats(p) {
    // Obtiene stats del caché social si están disponibles
    const cached = SocialCache.get(p.id);
    if (!cached) return "";
    const totalReacc = Object.values(cached.conteos||{}).reduce((a,b)=>a+b,0);
    const totalComt  = (cached.comentarios||[]).length;
    const parts = [];
    if (totalReacc > 0) parts.push(`${totalReacc} ❤️`);
    if (totalComt  > 0) parts.push(`${totalComt} 💬`);
    return parts.join("  ");
  },

  _render() {
    const lista = el("gestor-lista");
    lista.innerHTML = "";
    this._poemas.forEach((p, i) => {
      const visible = this._esVisible(p);
      const stats   = this._socialStats(p);

      // ── Fila principal ─────────────────────────────────────────
      const fila    = document.createElement("div");
      fila.className  = "gestor-fila";
      fila.innerHTML  = `
        <button class="gestor-btn-ord" onclick="Gestor._mover(${i},-1)" ${i===0?"disabled":""}>▲</button>
        <button class="gestor-btn-ord" onclick="Gestor._mover(${i}, 1)" ${i===this._poemas.length-1?"disabled":""}>▼</button>
        <div class="gestor-fila-info">
          <span class="gestor-fila-titulo" title="${_esc(p.titulo)}">${_esc(p.titulo)}</span>
          <div style="display:flex;gap:10px;align-items:center;">
            <span class="gestor-fila-fecha">${formatearFecha(p.creado_en)}</span>
            ${stats ? `<span class="gestor-fila-stats">${stats}</span>` : ""}
          </div>
        </div>
        <button class="gestor-btn-view" title="Ver poema y comentarios" onclick="Gestor._verPoema(${i})">👁️</button>
        <button class="gestor-vis-btn${visible?"":" oculto"}" onclick="Gestor._toggleVis(${i})">
          ${visible?"✔ Visible":"✖ Oculto"}
        </button>
        <button class="gestor-btn-del" title="Eliminar poema" onclick="Gestor._pedirConfirm(${i})">🗑️</button>`;
      lista.appendChild(fila);

      // ── Fila de confirmación de borrado (oculta por defecto) ───
      if (this._confirmando === i) {
        const cfila = document.createElement("div");
        cfila.className = "gestor-confirm";
        cfila.innerHTML = `
          <span>⚠️ ¿Eliminar "<strong>${_esc(p.titulo)}</strong>"? No se puede deshacer.</span>
          <button class="conf-si" onclick="Gestor._eliminar(${i})">Eliminar</button>
          <button class="conf-no" onclick="Gestor._cancelConfirm()">Cancelar</button>`;
        lista.appendChild(cfila);
      }
    });
  },

  _mover(idx, dir) {
    const ni = idx + dir;
    if (ni < 0 || ni >= this._poemas.length) return;
    [this._poemas[idx], this._poemas[ni]] = [this._poemas[ni], this._poemas[idx]];
    this._confirmando = -1;
    this._render();
  },

  _toggleVis(idx) {
    this._poemas[idx] = {...this._poemas[idx], visible: !this._esVisible(this._poemas[idx])};
    this._confirmando = -1;
    this._render();
  },

  // ── Ver poema en el visor ──────────────────────────────────────────
  _verPoema(idx) {
    const p = this._poemas[idx];
    App.cerrarGestor();
    // Abre el visor para ese poema (usa la lista en App._poemas)
    const original = App._poemas.find(o => o.id === p.id);
    if (original) App.abrirPoema(original);
    else toast("Poema no disponible, recarga la galería.");
  },

  // ── Confirmación de borrado ────────────────────────────────────────
  _pedirConfirm(idx) {
    this._confirmando = (this._confirmando === idx) ? -1 : idx;
    this._render();
    // Hacer scroll hasta la fila de confirmación
    setTimeout(() => {
      const lista = el("gestor-lista");
      if (lista) lista.scrollTop = lista.scrollHeight;
    }, 50);
  },

  _cancelConfirm() { this._confirmando = -1; this._render(); },

  async _eliminar(idx) {
    const p = this._poemas[idx];
    const btn = document.querySelector(".conf-si");
    if (btn) { btn.disabled = true; btn.textContent = "…"; }
    try {
      const res = await gasPost({
        action:"pwa_eliminar_poema", id:p.id, pwa_token:State.token
      }).catch(() => ({ok:false, error:"red"}));

      if (res.ok) {
        this._poemas.splice(idx, 1);
        this._original = this._original.filter(o => o.id !== p.id);
        // Actualizar también la lista en App
        App._poemas = App._poemas.filter(o => o.id !== p.id);
        this._confirmando = -1;
        this._render();
        const cnt = el("gestor-contador");
        if (cnt) cnt.textContent = `${this._poemas.length} poema${this._poemas.length!==1?"s":""}`;
        toast("🗑️ Poema eliminado.");
        App.refrescar();
      } else {
        const msg = res.error === "red" ? "Error de conexión." :
                    res.error?.includes("token") ? "No tienes permiso para eliminar poemas." :
                    (res.error || "No se pudo eliminar.");
        toast("⚠️ " + msg);
        this._confirmando = -1; this._render();
      }
    } catch { toast("Error al eliminar."); this._confirmando = -1; this._render(); }
  },

  async guardar() {
    const btn = el("btn-gestor-guardar");
    btn.disabled = true; btn.textContent = "Guardando…";
    let hayErrores = false;
    try {
      // 1. ── Visibilidades: pwa_token (GAS v6.1) con fallback a admin token ──
      const cambiosVis = [];
      for (const p of this._poemas) {
        const orig    = this._original.find(o => o.id === p.id);
        const visOrig = orig ? this._esVisible(orig) : true;
        const visNuev = this._esVisible(p);
        if (visOrig !== visNuev) {
          const intento = gasPost({
            action:"pwa_toggle_visible", id:p.id,
            visible:visNuev, pwa_token:State.token
          }).then(async res => {
            if (res.ok) return true;
            // GAS v6.0 requiere token admin — intentar si está disponible
            if (State.adminToken) {
              const r2 = await gasPost({
                action:"pwa_toggle_visible", id:p.id,
                visible:visNuev, token:State.adminToken
              }).catch(() => ({ ok:false }));
              if (r2.ok) return true;
            }
            console.warn("toggle_visible falló:", res.error, "id:", p.id);
            hayErrores = true;
            return false;
          }).catch(() => { hayErrores = true; return false; });
          cambiosVis.push(intento);
        }
      }
      await Promise.all(cambiosVis);

      // 2. ── Orden ───────────────────────────────────────────────────────────
      const orden = this._poemas.map(p => p.id);
      const resOrden = await gasPost({
        action:"pwa_reordenar_poemas", sesion_id:State.sesionId,
        orden, pwa_token:State.token
      }).catch(() => ({ ok:false, error:"red" }));

      if (!resOrden.ok) {
        const msg = resOrden.error || "";
        if (msg === "red") toast("⚠️ Error de red al guardar orden.");
        else if (msg.toLowerCase().includes("token") || msg.toLowerCase().includes("acceso"))
          toast("⚠️ Necesitas GAS v6.1 para reordenar. Visibilidad sí guardada.");
        else toast("⚠️ Orden no guardado: " + msg);
      }

      if (hayErrores) toast("⚠️ Algún cambio de visibilidad no se guardó.");
      else if (resOrden.ok) toast("✅ Cambios guardados correctamente.");

      App.cerrarGestor();
      App.refrescar();

    } catch { toast("Error de conexión al guardar."); }
    finally  { btn.disabled = false; btn.textContent = "💾 Guardar cambios"; }
  }
};

// ══════════════════════════════════════════════════════════════════
//  PULL TO REFRESH
// ══════════════════════════════════════════════════════════════════
let ptStart = 0;
const _body = document.getElementById("gallery-body");
_body.addEventListener("touchstart", e => { if (_body.scrollTop===0) ptStart = e.touches[0].clientY; }, {passive:true});
_body.addEventListener("touchend",   e => {
  if (!ptStart) return;
  if (e.changedTouches[0].clientY - ptStart > 70 && _body.scrollTop===0) App.refrescar();
  ptStart = 0;
}, {passive:true});

// ══════════════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════════════
function _mensajeError(code) {
  const map = { usuario_no_encontrado:"Usuario no encontrado.", credenciales_incorrectas:"Contraseña incorrecta.", usuario_inactivo:"Tu cuenta está inactiva.", usuario_requerido:"Introduce tu usuario.", pwd_hash_requerido:"Introduce tu contraseña." };
  return map[code] || ("Error: " + (code||"desconocido"));
}

function _placeholderThumbHTML() {
  const icons = ["📜","🌹","✉️","💌","🕊️","🌙","⭐","🌸"];
  return `<div class="poem-thumb-placeholder"><span class="placeholder-icon">${icons[Math.floor(Math.random()*icons.length)]}</span></div>`;
}
function _placeholderThumb() {
  const d = document.createElement("div"); d.className = "poem-thumb-placeholder";
  const icons = ["📜","🌹","✉️","💌","🕊️","🌙","⭐","🌸"];
  d.innerHTML = `<span class="placeholder-icon">${icons[Math.floor(Math.random()*icons.length)]}</span>`;
  return d;
}

function _formatFechaSocial(str) {
  if (!str) return "";
  const m = str.match(/(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2})/);
  if (!m) return str;
  return `${m[1]}/${m[2]}/${m[3]} ${m[4]}:${m[5]}`;
}

function _inyectarManifest() {
  const manifest = {
    name:"Mis Versos", short_name:"Mis Versos",
    description:"Tu galería privada de poemas",
    start_url:"./", display:"standalone", orientation:"portrait",
    background_color:"#0d0b14", theme_color:"#0d0b14",
    icons:[
      { src:_iconSvgDataUrl(192), sizes:"192x192", type:"image/svg+xml" },
      { src:_iconSvgDataUrl(512), sizes:"512x512", type:"image/svg+xml", purpose:"any maskable" }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:"application/manifest+json"});
  document.getElementById("pwa-manifest").href = URL.createObjectURL(blob);
}

function _iconSvgDataUrl(size) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${size} ${size}"><rect width="${size}" height="${size}" fill="#0d0b14"/><text x="50%" y="58%" font-size="${size*.55}" text-anchor="middle" dominant-baseline="middle">🕊️</text></svg>`;
  return "data:image/svg+xml;base64," + btoa(svg);
}

// ══════════════════════════════════════════════════════════════════
//  INICIO
// ══════════════════════════════════════════════════════════════════
App.init();
</script>
